name: fungus-genome-pipeline

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Core
  - python=3.11
  - tk

  # Read quality control and filtering
  - fastqc
  - multiqc
  - nanoplot
  - fastp
  - filtlong
  - porechop

  # De novo assembly
  - spades
  - flye

  # Mapping and polishing
  - minimap2
  - bwa
  - samtools
  - racon
  - pilon

  # Assembly quality assessment
  - quast
  - busco
  - augustus

  # General utilities
  - seqkit
  - diamond
  - eggnog-mapper
  - interproscan



